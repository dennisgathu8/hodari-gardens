version: 2
updates:
  # Enable weekly updates for Clojure dependencies in deps.edn
  - package-ecosystem: "clojurescript" # Clojure/ClojureScript deps.edn ecosystem
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Enable weekly updates for Node/npm dependencies in package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
